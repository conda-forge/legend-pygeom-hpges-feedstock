schema_version: 1

context:
  name: legend-pygeom-hpges
  version: "0.10.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/legend_pygeom_hpges-${{ version }}.tar.gz
  sha256: 22deb03471382e666e0a5720596a916589c1d8b98e2a28adda3ba6870ed3b82b

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools-scm >=7
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - numba
    - pint !=0.24
    - pyg4ometry
    - dbetto
    - awkward

tests:
  - python:
      imports:
        - legendhpges
        - pygeomhpges
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Geometry management for LEGEND HPGe detectors
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/legend-exp/legend-pygeom-hpges
  repository: https://github.com/legend-exp/legend-pygeom-hpges
  documentation: https://legend-pygeom-hpges.readthedocs.io

extra:
  recipe-maintainers:
    - gipert
    - ManuelHu
